services:
  db:
    build:
      context: ./db
    container_name: fuel-db
    environment:
      MARIADB_ROOT_PASSWORD: root_password
      MARIADB_DATABASE: fuel_calculator_localization
      MARIADB_USER: fuel_user
      MARIADB_PASSWORD: fuel_password
    ports:
      - "3317:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
    container_name: fuel-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mariadb://db:3306/fuel_calculator_localization
      DB_USER: fuel_user
      DB_PASSWORD: fuel_password

volumes:
  mariadb_data: